name: Build Windows EXE

on:
  push:
    branches: [ main, ocr ]
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Tesseract OCR via Chocolatey
      run: |
        choco install tesseract -y --force
        # 显示安装路径
        where tesseract
        dir "C:\Program Files\Tesseract-OCR" 2>nul || dir "C:\tools\Tesseract-OCR" 2>nul || echo "Tesseract path not found"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        python build.py
      env:
        # 允许脚本找到Chocolatey安装的Tesseract
        TESSERACT_PATH: "C:\\Program Files\\Tesseract-OCR"

    - name: Verify build
      shell: cmd
      run: |
        if exist dist\SOC1Extractor.exe (
          echo Build successful
          dir dist\SOC1Extractor.exe
        ) else (
          echo Build failed - exe not found
          exit /b 1
        )

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SOC1Extractor-Windows
        path: dist/SOC1Extractor.exe
        retention-days: 30

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SOC1Extractor.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}